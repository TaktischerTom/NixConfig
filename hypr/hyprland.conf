
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################
# remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=DP-1,preferred,0x0,auto
monitor=DP-2,preferred,-2560x0, auto

monitor=HDMI-A-1,preferred,3440x300, auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = konsole
$fileManager = thunar
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = qs --path ~/amnytas/config/rice/quickshell
exec-once = systemctl --user stop app-org.fcitx.Fcitx5@autostart.service
exec-once = [workspace special:wanikani silent] firefox --new-window https://www.wanikani.com/
exec-once = steam -console
exec-once = [workspace 6] obs
exec-once = vesktop
exec-once = systemctl --user start hyprpolkitagent


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(E0B2FFee) rgba(9900FFee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade

    animation = border,1,10,default
    animation = borderangle, 1, 20, linear, loop
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = eu
    kb_variant =
    kb_model =
    kb_options = srvrkeys:none, caps:escape, lv3:switch
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
# bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen,

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, F2, workspace, 4
bind = $mainMod, F3, workspace, 5
bind = $mainMod, F4, workspace, 6

bind = $mainMod, 4, workspace, 7
bind = $mainMod, 5, workspace, 8
bind = $mainMod, 6, workspace, 9

bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, F2, movetoworkspace, 4
bind = $mainMod SHIFT, F3, movetoworkspace, 5
bind = $mainMod SHIFT, F4, movetoworkspace, 6

bind = $mainMod SHIFT, 4, movetoworkspace, 7
bind = $mainMod SHIFT, 5, movetoworkspace, 8
bind = $mainMod SHIFT, 6, movetoworkspace, 9

bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic\

bind = $mainMod, W, togglespecialworkspace, wanikani
bind = $mainMod SHIFT, W, movetoworkspace, special:wanikani\

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod,SPACE,exec,$(tofi-run)

bindl = ,XF86AudioMute,exec,playerctl play-pause # remap epomaker knob to play/plause
bindr = ,SUPER_L,exec, # Make windows key not do shit when its the only thing happening

bind = $mainMod,I,exec,if systemctl --user is-active --quiet app-org.fcitx.Fcitx5@autostart.service; then systemctl --user stop app-org.fcitx.Fcitx5@autostart.service; else systemctl --user start app-org.fcitx.Fcitx5@autostart.service; fi

  # recording
bind = $mainMod SHIFT,X,exec,wf-recorder -y -f ~/Videos/wf-recording.mp4 -g "$(slurp)"
bind = CTRL $mainMod,X,exec,wf-recorder -y -f ~/Videos/wf-recording.mp4 -g "$(slurp -o)"
# stop recording
bind = $mainMod,X,exec,pkill --signal SIGINT wf-recorder

# Screenshots
bind = $mainMod SHIFT,S,exec,grim -g "$(slurp)" - | swappy -f - -o - | wl-copy; wl-paste > ~/Pictures/screenshot.png
bind = CTRL $mainMod SHIFT,S,exec,grimblast save area - | swappy -f - -o - | wl-copy; wl-paste > ~/Pictures/screenshot.png
bind = CTRL $mainMod,S,exec,grimblast --freeze save output - | swappy -f - -o - | wl-copy; wl-paste > ~/Pictures/Screenshot.png

# KILL
bind = $mainMod,BACKSPACE,exec,hyprctl kill

# OBS
bind = CTRL, F9, pass, class:^(com\.obsproject\.Studio)$
bind = CTRL,F10,exec,clipper

# Switch Workspace direction
bind = $mainMod,A,exec,workspace-direction -
bind = $mainMod,D,exec,workspace-direction +

bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, layoutmsg, move +col
bind = $mainMod, mouse_up, layoutmsg, move -col

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

windowrule {
  name = windowrule-18
  workspace = 1
  match:class = steam
}

windowrule {
  name = windowrule-19
  float = on
  no_initial_focus = on
  size = 500 500
  match:class = org.keepassxc.KeePassXC
}

windowrule {
  name = windowrule-20
  fullscreen = on
  match:class = waydroid.com.YoStarEN.Arknights
}

windowrule {
  name = windowrule-3
  workspace = 3
  match:class = steam_app_.*
}

windowrule {
  name = windowrule-4
  workspace = 10
  match:class = vesktop.*
}

windowrule {
  name = windowrule-5
  workspace = 10
  match:class = vesktop.*
}

windowrule {
  name = windowrule-6
  workspace = special trash silent
  match:title = ^$ class:steam_app_0
}

windowrule {
  name = windowrule-7
  workspace = 5
  match:class = ^(org.gnome.gitlab.YaLTeR.VideoTrimmer)$
}


windowrule {
  name = windowrule-8
  tag = +game
  match:class = ^(steam_app.*)$
}

windowrule {
  name = windowrule-9
  tag = +game
  match:class = ^(waywall.*)$
}

windowrule {
  name = windowrule-10
  tag = +game
  match:class = ^(gamescope)$
}

windowrule {
  name = windowrule-11
  tag = +game
  match:class = ^(moe\.launcher.*)$
}

windowrule {
  name = windowrule-12
  tag = +game
  match:class = ^(starrail\.exe)$
}

windowrule {
  name = windowrule-13
  tag = +game
  match:class = ^(ffxiv_dx11\.exe)$
}

windowrule {
  name = windowrule-14
  tag = +game
  match:class = codium-url-handler
}

windowrule {
  name = windowrule-15
  tag = +game
  match:class = ^(genshinimpact\.exe)$
}

windowrule {
  name = windowrule-16
  tag = +game
  float = on
  match:class = ^(moe\.launcher\.an-anime-game-launcher)$
}

# Some games dont like not being rendered
windowrule {
  name = windowrule-17
  render_unfocused = on
  match:tag = game
}

windowrule = fullscreen on, match:class ^Waydroid$


workspace=1, monitor:DP-1
workspace=2, monitor:DP-1
workspace=3, monitor:DP-1
workspace=4, monitor:DP-1
workspace=5, monitor:DP-1
workspace=6, monitor:DP-1

workspace=7, monitor:DP-2
workspace=8, monitor:DP-2
workspace=9, monitor:DP-2
workspace=10, monitor:HDMI-A-1

debug {
    full_cm_proto = 1
}
